<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LFML — Letters For My Lover</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800;900&family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #080809; font-family: 'Outfit', sans-serif; color: #eef2f6; overflow-x: hidden; min-height: 100vh; }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }

  /* ── Keyframes ── */
  @keyframes rise {
    0%   { transform: translateY(0) scale(1); opacity: 0; }
    8%   { opacity: 1; }
    92%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) scale(1.1); opacity: 0; }
  }
  @keyframes floatUp   { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn    { from { opacity:0; } to { opacity:1; } }
  @keyframes fadeOut   { from { opacity:1; } to { opacity:0; } }
  @keyframes popIn     { from { opacity:0; transform:scale(0.86); } to { opacity:1; transform:scale(1); } }
  @keyframes modalIn   { from { opacity:0; transform:scale(0.84) translateY(18px); } to { opacity:1; transform:scale(1) translateY(0); } }
  @keyframes modalOut  { from { opacity:1; transform:scale(1) translateY(0); } to { opacity:0; transform:scale(0.9) translateY(10px); } }
  @keyframes rowIn     { from { opacity:0; transform:translateX(-14px) scale(0.96); } to { opacity:1; transform:translateX(0) scale(1); } }
  @keyframes cardIn    { from { opacity:0; transform:translateY(22px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
  @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-9px)} 40%{transform:translateX(9px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  @keyframes rippleOut { from { transform:scale(0); opacity:1; } to { transform:scale(5); opacity:0; } }
  @keyframes pulse     { 0%,100%{opacity:0.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.25)} }
  @keyframes spin      { to { transform:rotate(360deg); } }
  @keyframes growBar   { from{width:0;opacity:0} to{width:40px;opacity:1} }
  @keyframes slideLeft { from{opacity:0;transform:translateX(-14px)} to{opacity:1;transform:translateX(0)} }
  @keyframes bounceIn  { from{transform:scale(0.65);opacity:0} to{transform:scale(1);opacity:1} }
  @keyframes chevronSpin { to { transform: rotate(180deg); } }

  /* ── Pages ── */
  .page { min-height: 100vh; position: relative; overflow-x: hidden; }
  .page.hidden { display: none; }

  /* ── Bubble canvas ── */
  #bubble-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bubble {
    position: absolute; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, rgba(130,210,240,0.12), rgba(40,140,180,0.04));
    border: 1px solid rgba(160,225,245,0.12);
    animation: rise var(--dur) var(--delay) infinite ease-in-out;
    bottom: calc(-1 * var(--size));
    left: var(--x);
    width: var(--size); height: var(--size);
  }

  /* ── Ambient glow blobs ── */
  .glow-blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; }

  /* ── Glass card base ── */
  .glass {
    background: rgba(255,255,255,0.038);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 26px;
  }
  .glass-sm {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 999px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 18px; border-radius: 999px;
  }

  /* ── Ripple ── */
  .ripple-host { position: relative; overflow: hidden; }
  .ripple-circle {
    position: absolute; border-radius: 50%;
    width: 120px; height: 120px;
    margin-left: -60px; margin-top: -60px;
    pointer-events: none;
    animation: rippleOut 0.65s cubic-bezier(0.16,1,0.3,1) forwards;
  }

  /* ── Spring press ── */
  .spring { transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1); cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
  .spring:active { transform: scale(0.94) !important; transition: transform 0.08s ease !important; }

  /* ═══════════ LOGIN PAGE ═══════════ */
  #login-page {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(180deg, #060607 0%, #09090c 50%, #060607 100%);
    animation: fadeIn 0.4s ease both;
  }
  #login-page.exiting { animation: fadeOut 0.4s ease forwards; }

  .login-inner { position: relative; z-index: 1; width: 100%; max-width: 400px; padding: 0 24px; display: flex; flex-direction: column; align-items: center; }

  .login-logo { text-align: center; margin-bottom: 48px; animation: floatUp 0.9s cubic-bezier(0.34,1.56,0.64,1) both; }
  .login-title {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: clamp(60px, 16vw, 96px);
    letter-spacing: -0.03em; line-height: 0.9;
    color: #eef2f6;
    text-shadow: 0 0 120px rgba(34,180,215,0.2);
    margin-bottom: 14px;
    animation: floatUp 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.08s both;
  }
  .login-subtitle { animation: floatUp 0.85s cubic-bezier(0.34,1.56,0.64,1) 0.16s both; }

  .login-card {
    width: 100%;
    background: rgba(255,255,255,0.042);
    backdrop-filter: blur(32px) saturate(1.4);
    -webkit-backdrop-filter: blur(32px) saturate(1.4);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: 32px 26px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.35);
    transition: border-color 0.3s, box-shadow 0.4s cubic-bezier(0.34,1.56,0.64,1);
    animation: floatUp 0.85s cubic-bezier(0.34,1.56,0.64,1) 0.24s both;
  }
  .login-card.focused { border-color: rgba(255,255,255,0.13); box-shadow: 0 0 0 4px rgba(34,211,238,0.06), 0 24px 60px rgba(0,0,0,0.45); }
  .login-card.error { animation: shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97); }

  .input-label { font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase; color: rgba(255,255,255,0.28); font-weight: 500; margin-bottom: 10px; }

  .input-row {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.04);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 16px; padding: 0 16px;
    transition: border-color 0.25s, background 0.25s, box-shadow 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  .input-row.focused { border-color: rgba(34,211,238,0.4); background: rgba(255,255,255,0.06); box-shadow: 0 0 0 3px rgba(34,211,238,0.07); transform: scale(1.01); }
  .input-row.error   { border-color: rgba(248,113,113,0.5); box-shadow: 0 0 0 3px rgba(248,113,113,0.1); }

  .input-row input {
    flex: 1; background: transparent; border: none; outline: none;
    font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 400;
    color: rgba(230,238,244,0.9); padding: 15px 0; letter-spacing: 0.12em;
  }
  .input-row input::placeholder { color: rgba(255,255,255,0.22); letter-spacing: 0.05em; }
  .input-row.error input { color: rgba(248,150,150,0.9); }

  .error-msg { height: 18px; font-size: 12px; color: rgba(248,113,113,0.8); margin-top: 9px; opacity: 0; transition: opacity 0.2s; }
  .error-msg.show { opacity: 1; }

  .btn-enter {
    width: 100%; padding: 14px; border: none; outline: none; cursor: pointer;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; margin-top: 18px;
    font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700;
    letter-spacing: 0.06em; color: rgba(255,255,255,0.25);
    transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
    position: relative; overflow: hidden;
  }
  .btn-enter.active {
    background: linear-gradient(135deg, rgba(34,211,238,0.22), rgba(56,189,248,0.18));
    border-color: rgba(34,211,238,0.35);
    color: rgba(180,235,248,0.95);
    cursor: pointer;
  }
  .btn-enter .spinner { width:14px; height:14px; border-radius:50%; border:2px solid rgba(180,235,248,0.3); border-top-color:rgba(180,235,248,0.9); animation:spin 0.6s linear infinite; display:inline-block; vertical-align:middle; margin-right:8px; }

  .login-footer { margin-top: 26px; font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.12); animation: floatUp 0.85s cubic-bezier(0.34,1.56,0.64,1) 0.3s both; }

  /* ═══════════ MAIN APP ═══════════ */
  #main-page {
    background: linear-gradient(180deg, #080809 0%, #0c0c0f 35%, #0a0a0d 70%, #080809 100%);
    animation: fadeIn 0.5s ease both;
  }

  .app-inner { position: relative; z-index: 1; max-width: 1040px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  .app-header { text-align: center; padding: 80px 0 52px; }
  .header-badge { animation: floatUp 0.85s cubic-bezier(0.34,1.56,0.64,1) 0.05s both; margin-bottom: 26px; }
  .dot-pulse { width:6px; height:6px; border-radius:50%; background:#22d3ee; animation: pulse 2.8s infinite; display:inline-block; }
  .badge-text { font-size:10px; letter-spacing:4px; text-transform:uppercase; font-weight:600; color:rgba(255,255,255,0.4); }

  .app-title {
    font-family: 'Playfair Display', serif; font-weight: 800;
    font-size: clamp(64px, 11vw, 112px);
    letter-spacing: -0.03em; line-height: 0.92;
    color: #eef2f6; margin-bottom: 14px;
    text-shadow: 0 0 120px rgba(34,180,215,0.15);
    animation: floatUp 0.9s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  }
  .app-sub { animation: floatUp 0.85s cubic-bezier(0.34,1.56,0.64,1) 0.18s both; display:inline-block; margin-top:10px; }
  .app-sub-text { font-size: clamp(13px,2vw,16px); font-weight:400; letter-spacing:0.08em; color:rgba(200,215,225,0.5); }

  /* Search */
  .search-wrap { margin-bottom: 14px; animation: floatUp 0.85s cubic-bezier(0.16,1,0.3,1) 0.1s both; transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1); }
  .search-wrap.focused { transform: scale(1.018); }
  .search-bar {
    display: flex; align-items: center; gap: 14px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 18px; padding: 0 18px;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 2px 12px rgba(0,0,0,0.2);
  }
  .search-bar.focused { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.18); box-shadow: 0 0 0 4px rgba(34,211,238,0.07), 0 8px 32px rgba(0,0,0,0.3); }
  .search-bar.has-query { border-color: rgba(34,211,238,0.45); }
  .search-bar input { flex:1; background:transparent; border:none; outline:none; font-family:'Outfit',sans-serif; font-size:15px; color:rgba(230,238,244,0.88); padding:16px 0; }
  .search-bar input::placeholder { color: rgba(255,255,255,0.22); }
  .search-icon { flex-shrink:0; transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1); }
  .search-bar.focused .search-icon { transform: scale(1.15); }
  .clear-btn { width:22px; height:22px; border-radius:50%; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.5); font-size:11px; cursor:pointer; display:flex; align-items:center; justify-content:center; animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1); }
  .clear-btn.hidden { display:none; }

  /* Search results */
  #search-results { margin-bottom: 36px; display:none; }
  #search-results.show { display:block; animation: popIn 0.36s cubic-bezier(0.34,1.56,0.64,1); }
  .results-box { background:rgba(12,12,16,0.88); backdrop-filter:blur(32px) saturate(1.4); -webkit-backdrop-filter:blur(32px) saturate(1.4); border:1px solid rgba(255,255,255,0.08); border-radius:22px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,0.5); }
  .results-header { padding:13px 22px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; justify-content:space-between; }
  .results-count { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:rgba(255,255,255,0.3); font-weight:500; }
  .results-query { font-size:11px; color:rgba(255,255,255,0.18); }
  .results-list { padding:10px 12px; }
  .result-row { display:flex; align-items:center; justify-content:space-between; padding:14px 16px; border-radius:14px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.04); cursor:pointer; margin-bottom:4px; transition: background 0.18s; position:relative; overflow:hidden; }
  .result-row:last-child { margin-bottom:0; }
  .result-row:hover { background: rgba(255,255,255,0.05); }
  .result-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:14px; }
  .result-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:600; color:rgba(240,240,244,0.9); }
  .result-meta  { font-size:11px; color:rgba(255,255,255,0.28); margin-top:2px; }
  .result-arrow { font-size:16px; }
  .empty-results { padding:32px 22px; text-align:center; }
  .empty-title { font-family:'Playfair Display',serif; font-size:15px; font-weight:600; color:rgba(255,255,255,0.2); }
  .empty-sub   { font-size:12px; color:rgba(255,255,255,0.12); margin-top:6px; }

  /* Volumes grid */
  #volumes-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(min(290px, 100%), 1fr)); gap:22px; padding-bottom:100px; }

  /* Volume card */
  .vol-card { background:rgba(255,255,255,0.035); backdrop-filter:blur(28px) saturate(1.5); -webkit-backdrop-filter:blur(28px) saturate(1.5); border:1px solid rgba(255,255,255,0.07); border-radius:26px; overflow:hidden; transition: box-shadow 0.42s cubic-bezier(0.16,1,0.3,1), border-color 0.42s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .vol-card.open { transform: translateY(-4px) scale(1.005); }

  /* Cover */
  .vol-cover { position:relative; padding-bottom:100%; overflow:hidden; border-radius:22px 22px 0 0; cursor:pointer; transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1); }
  .vol-cover:active { transform: scale(0.97); transition: transform 0.1s ease; }
  .vol-cover.coming-soon { cursor:default; }
  .vol-cover-bg { position:absolute; inset:0; background-size:cover; background-position:center; transition: transform 0.6s ease; }
  .vol-card.open .vol-cover-bg { transform: scale(1.06); }
  .vol-cover-sheen { position:absolute; inset:0; background:linear-gradient(145deg, rgba(255,255,255,0.03) 0%, transparent 50%, rgba(0,0,0,0.18) 100%); }
  .vol-cover-grad  { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 52%); }

  .vol-letters-stack { position:absolute; left:20px; top:20px; display:flex; flex-direction:column; }
  .vol-letters-stack span { font-family:'Playfair Display',serif; font-weight:800; font-size:clamp(18px,3vw,26px); line-height:1.1; letter-spacing:-0.01em; color:rgba(220,235,242,0.72); }

  .vol-badge { position:absolute; bottom:16px; right:16px; background:rgba(0,0,0,0.45); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.12); border-radius:999px; padding:5px 14px; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .vol-card.open .vol-badge { transform: scale(1.06); }
  .vol-badge span { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; font-weight:600; color:rgba(230,240,245,0.85); }

  .coming-soon-overlay { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(0,0,0,0.4); backdrop-filter:blur(4px); }
  .coming-soon-pill { background:rgba(20,20,25,0.7); border:1px solid rgba(255,255,255,0.1); border-radius:999px; padding:9px 24px; }
  .coming-soon-pill span { font-size:11px; letter-spacing:4px; text-transform:uppercase; font-weight:500; color:rgba(200,210,220,0.5); }

  /* Card footer */
  .vol-footer { padding:17px 20px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(255,255,255,0.05); cursor:pointer; transition: border-color 0.3s; position:relative; overflow:hidden; }
  .vol-card.open .vol-footer { border-top-color: rgba(255,255,255,0.09); }
  .vol-name { font-family:'Playfair Display',serif; font-size:17px; font-weight:700; letter-spacing:-0.02em; color:rgba(240,242,246,0.92); }
  .vol-sub  { font-size:10px; letter-spacing:2.5px; text-transform:uppercase; color:rgba(255,255,255,0.3); font-weight:500; margin-top:3px; }
  .vol-meta { display:flex; align-items:center; gap:9px; }
  .vol-count { border-radius:999px; padding:3px 11px; font-size:10px; letter-spacing:1.5px; font-weight:600; }
  .chevron { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.3s, border-color 0.3s, color 0.3s; }
  .vol-card.open .chevron { transform: rotate(180deg) scale(1.1); }

  /* Letters list */
  .letters-list { border-top:1px solid rgba(255,255,255,0.05); padding:8px 10px 12px; display:flex; flex-direction:column; gap:6px; display:none; }
  .vol-card.open .letters-list { display:flex; }

  .letter-row { display:flex; justify-content:space-between; align-items:center; padding:13px 14px; border-radius:16px; background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.04); cursor:pointer; transition: background 0.2s, border-color 0.2s, transform 0.5s cubic-bezier(0.34,1.56,0.64,1); position:relative; overflow:hidden; }
  .letter-row:hover { background:rgba(255,255,255,0.05); border-color:rgba(255,255,255,0.08); transform: translateX(4px); }
  .letter-row:active { transform:scale(0.96); transition:transform 0.08s ease; }
  .letter-title { font-family:'Playfair Display',serif; font-size:14px; font-weight:600; letter-spacing:-0.01em; color:rgba(200,210,220,0.85); }
  .letter-date  { font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-top:3px; }
  .letter-arrow { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; transition:all 0.2s; }

  /* ── Modal ── */
  #modal-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,0.78); backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
    display:flex; align-items:center; justify-content:center;
    padding:24px; display:none;
  }
  #modal-overlay.show { display:flex; animation:fadeIn 0.22s ease; }
  #modal-box {
    background:rgba(10,12,16,0.92); backdrop-filter:blur(48px) saturate(1.6); -webkit-backdrop-filter:blur(48px) saturate(1.6);
    border:1px solid rgba(255,255,255,0.09); border-radius:28px;
    max-width:620px; width:100%; max-height:85vh; overflow-y:auto;
    padding:44px 40px; position:relative;
    box-shadow:0 40px 80px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: modalIn 0.42s cubic-bezier(0.34,1.56,0.64,1);
  }
  #modal-box.closing { animation: modalOut 0.28s cubic-bezier(0.34,1,0.64,1) forwards; }
  .modal-close { position:absolute; top:18px; right:18px; width:32px; height:32px; border-radius:50%; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); color:rgba(255,255,255,0.45); font-size:13px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition: background 0.2s; }
  .modal-close:hover { background:rgba(255,255,255,0.13); }
  .modal-tag { display:inline-flex; align-items:center; border-radius:999px; padding:4px 14px; margin-bottom:18px; font-size:10px; letter-spacing:3px; text-transform:uppercase; font-weight:500; animation: slideLeft 0.4s cubic-bezier(0.34,1.56,0.64,1) 0.1s both; }
  .modal-title { font-family:'Playfair Display',serif; font-size:clamp(20px,3.5vw,28px); font-weight:700; line-height:1.2; color:#f0f0f4; margin-bottom:20px; animation: slideLeft 0.42s cubic-bezier(0.34,1.56,0.64,1) 0.15s both; }

(function spawnBubbles() {

    const b = document.createElement('div');
    b.className = 'bubble';

    canvas.appendChild(b);
  }
})();

/* ─── RIPPLE ────────────────────────────────────────────────────────────── */
function addRipple(host, e, color) {
  const rect = host.getBoundingClientRect();
  const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
  const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
  const r = document.createElement('div');
  r.className = 'ripple-circle';
  r.style.left = x + 'px';
  r.style.top  = y + 'px';
  r.style.background = (color || 'rgba(34,211,238,0.18)');
  host.appendChild(r);
  setTimeout(() => r.remove(), 700);
}

document.querySelectorAll('.ripple-host').forEach(el => {
  el.addEventListener('mousedown', e => addRipple(el, e));
  el.addEventListener('touchstart', e => addRipple(el, e), {passive:true});
});

/* ═══════════ LOGIN ═══════════ */
const pwInput  = document.getElementById('pw-input');
const btnEnter = document.getElementById('btn-enter');
const errorMsg = document.getElementById('error-msg');
const inputRow = document.getElementById('input-row');
const loginCard= document.getElementById('login-card');
const loginPage= document.getElementById('login-page');
const mainPage = document.getElementById('main-page');

pwInput.addEventListener('focus', () => {
  inputRow.classList.add('focused');
  loginCard.classList.add('focused');
});
pwInput.addEventListener('blur', () => {
  inputRow.classList.remove('focused');
  loginCard.classList.remove('focused');
});
pwInput.addEventListener('input', () => {
  errorMsg.classList.remove('show');
  inputRow.classList.remove('error');
  btnEnter.disabled = !pwInput.value;
  btnEnter.classList.toggle('active', !!pwInput.value);
});
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });
btnEnter.addEventListener('click', tryLogin);

function tryLogin() {
  if (!pwInput.value) return;
  if (pwInput.value === PASSWORD) {
    btnEnter.innerHTML = '<span class="spinner"></span>Opening...';
    btnEnter.disabled = true;
    setTimeout(() => {
      loginPage.classList.add('exiting');
      setTimeout(() => {
        loginPage.classList.add('hidden');
        mainPage.classList.remove('hidden');
        buildApp();
      }, 420);
    }, 380);
  } else {
    errorMsg.classList.add('show');
    inputRow.classList.add('error');
    loginCard.style.animation = 'none';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { loginCard.style.animation = 'shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97)'; });
    });
    pwInput.value = '';
    btnEnter.disabled = true;
    btnEnter.classList.remove('active');
  }
}

    : `background:${vol.gradient};`;

  const comingHTML = vol.comingSoon
    ? `<div class="coming-soon-overlay"><div class="coming-soon-pill"><span>Coming Soon</span></div></div>`
    : '';

  const lettersHTML = (vol.letters || []).map((l, i) => `
    <div class="letter-row ripple-host spring" data-vol="${vol.id}" data-letter="${l.id}"
         style="animation:rowIn 0.45s cubic-bezier(0.34,1.56,0.64,1) ${i*0.07}s both;"
         onmousedown="addRipple(this,event,'${vol.accent}44')">
      <div>
        <div class="letter-title">${l.title}</div>
        <div class="letter-date" style="color:${vol.accent}55;">${l.date}</div>
      </div>
      <div class="letter-arrow" style="background:${vol.accent}10;border:1px solid ${vol.accent}20;color:${vol.accent}66;">→</div>
    </div>`).join('');

  const footerHTML = vol.comingSoon ? '' : `
    <div class="vol-footer ripple-host spring" data-toggle="${vol.id}">
      <div>
        <div class="vol-name">${vol.title} — ${vol.subtitle}</div>
        <div class="vol-sub">${vol.letters.length} ${vol.letters.length===1?'chapter':'chapters'}</div>
      </div>
      <div class="vol-meta">
        <div class="vol-count" style="background:${vol.accent}14;border:1px solid ${vol.accent}28;color:${vol.accent}99;">${vol.letters.length}</div>
        <div class="chevron" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.4);">↓</div>
      </div>
    </div>
    <div class="letters-list">${lettersHTML}</div>`;

  card.innerHTML = `
    <div class="vol-cover ${vol.comingSoon?'coming-soon':''} ripple-host" data-toggle="${vol.comingSoon?'':''+vol.id}">
      <div class="vol-cover-bg" style="${coverBg}"></div>
      <div class="vol-cover-sheen"></div>
      <div class="vol-cover-grad"></div>
      <div class="vol-letters-stack">
        ${'LFML'.split('').map(ch=>`<span style="text-shadow:0 0 24px ${vol.accent}55;">${ch}</span>`).join('')}
      </div>
      <div class="vol-badge"><span>${vol.title}</span></div>
      ${comingHTML}
    </div>
    ${footerHTML}`;

  card.style.boxShadow = `0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04)`;

  // Cover ripple
  const cover = card.querySelector('.vol-cover');
  cover.addEventListener('mousedown', e => addRipple(cover, e, vol.accent+'44'));
  cover.addEventListener('touchstart', e => addRipple(cover, e, vol.accent+'44'), {passive:true});

  // Toggle
  card.querySelectorAll('[data-toggle]').forEach(el => {
    const id = parseInt(el.dataset.toggle);
    if (!id) return;
    el.addEventListener('click', () => toggleVol(id));
  });

  // Letter click
  card.querySelectorAll('[data-letter]').forEach(el => {
    el.addEventListener('click', () => {
      const vid = parseInt(el.dataset.vol);
      const lid = parseInt(el.dataset.letter);
      const v = VOLUMES.find(v=>v.id===vid);
      const l = v.letters.find(l=>l.id===lid);
      openModal(l, v.accent);
    });
  });

  // Footer ripple
  const footer = card.querySelector('.vol-footer');
  if (footer) {
    footer.addEventListener('mousedown', e => addRipple(footer, e, vol.accent+'33'));
    footer.addEventListener('touchstart', e => addRipple(footer, e, vol.accent+'33'), {passive:true});
  }

  return card;
}

function toggleVol(id) {
  const vol = VOLUMES.find(v=>v.id===id);
  if (!vol || vol.comingSoon) return;
  const card = document.querySelector(`.vol-card[data-id="${id}"]`);
  const isNowOpen = openVolId !== id;
  // close all
  document.querySelectorAll('.vol-card').forEach(c => {
    c.classList.remove('open');
    const ch = c.querySelector('.chevron');
    if (ch) { ch.style.background='rgba(255,255,255,0.06)'; ch.style.borderColor='rgba(255,255,255,0.08)'; ch.style.color='rgba(255,255,255,0.4)'; }
    c.style.boxShadow='0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04)';
    c.style.borderColor='rgba(255,255,255,0.07)';
  });
  openVolId = isNowOpen ? id : null;
  if (isNowOpen) {
    card.classList.add('open');
    const ch = card.querySelector('.chevron');
    if (ch) { ch.style.background=`${vol.accent}20`; ch.style.borderColor=`${vol.accent}38`; ch.style.color=`${vol.accent}cc`; }
    card.style.boxShadow=`0 0 48px ${vol.accent}1a, 0 20px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.07)`;
    card.style.borderColor=`rgba(255,255,255,0.11)`;
  }
}

/* ── Search ── */
function initSearch() {
  const wrap   = document.getElementById('search-wrap');
  const bar    = document.getElementById('search-bar');
  const input  = document.getElementById('search-input');
  const icon   = document.getElementById('search-icon');
  const clearBtn = document.getElementById('clear-btn');
  const results  = document.getElementById('search-results');
  const grid     = document.getElementById('volumes-grid');

  input.addEventListener('focus', () => {
    wrap.classList.add('focused');
    bar.classList.add('focused');
    icon.setAttribute('stroke', 'rgba(255,255,255,0.45)');
  });
  input.addEventListener('blur', () => {
    wrap.classList.remove('focused');
    bar.classList.remove('focused');
    if (!input.value) icon.setAttribute('stroke','rgba(255,255,255,0.22)');
  });
  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('hidden', !q);
    bar.classList.toggle('has-query', !!q);
    icon.setAttribute('stroke', q ? 'rgba(34,211,238,0.85)' : 'rgba(255,255,255,0.45)');
    if (q) { runSearch(q); results.classList.add('show'); grid.style.display='none'; }
    else   { results.classList.remove('show'); grid.style.display=''; }
  });
  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.add('hidden');
    bar.classList.remove('has-query');
    icon.setAttribute('stroke','rgba(255,255,255,0.22)');
    results.classList.remove('show');
    grid.style.display = '';
    input.focus();
  });
}

function runSearch(q) {
  const ql = q.toLowerCase();
  const matches = [];
  VOLUMES.forEach(vol => {
    (vol.letters||[]).forEach(l => {
      if ([l.title, l.date, l.body, vol.title, vol.subtitle].some(s => s.toLowerCase().includes(ql))) {
        matches.push({...l, volTitle: vol.title, accent: vol.accent, volId: vol.id});
      }
    });
  });

  document.getElementById('results-count').textContent = `${matches.length} result${matches.length!==1?'s':''}`;
  document.getElementById('results-query').textContent  = `"${q}"`;

  const list = document.getElementById('results-list');
  if (matches.length === 0) {
    list.innerHTML = `<div class="empty-results"><div class="empty-title">No letters found</div><div class="empty-sub">Try a different search</div></div>`;
    return;
  }
  list.innerHTML = matches.map((m, i) => `
    <div class="result-row ripple-host spring" data-vid="${m.volId}" data-lid="${m.id}"
         style="animation:cardIn 0.35s cubic-bezier(0.34,1.56,0.64,1) ${i*0.06}s both;">
      <div style="display:flex;align-items:center;gap:14px;">
        <div class="result-icon" style="background:${m.accent}18;border:1px solid ${m.accent}30;">✉</div>
        <div>
          <div class="result-title">${m.title}</div>
          <div class="result-meta">${m.volTitle} · ${m.date}</div>
        </div>
      </div>
      <div class="result-arrow" style="color:${m.accent}66;">→</div>
    </div>`).join('');

  list.querySelectorAll('.result-row').forEach(row => {
    const vid = parseInt(row.dataset.vid), lid = parseInt(row.dataset.lid);
    row.addEventListener('mousedown', e => addRipple(row, e, matches.find(m=>m.id===lid)?.accent+'33'));
    row.addEventListener('click', () => {
      const vol = VOLUMES.find(v=>v.id===vid);
      const letter = vol.letters.find(l=>l.id===lid);
      openModal(letter, vol.accent);
    });
  });
}

/* ── Modal ── */
const overlay   = document.getElementById('modal-overlay');
const modalBox  = document.getElementById('modal-box');
const modalClose= document.getElementById('modal-close');
const modalTag  = document.getElementById('modal-tag');
const modalTitle= document.getElementById('modal-title');
const modalBar  = document.getElementById('modal-bar');
const modalBody = document.getElementById('modal-body');

modalClose.addEventListener('click', closeModal);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
modalBox.addEventListener('mousedown', e => addRipple(modalBox, e, 'rgba(255,255,255,0.04)'));

function openModal(letter, accent) {
  modalTag.textContent   = letter.date;
  modalTag.style.cssText = `background:${accent}18;border:1px solid ${accent}40;color:${accent}cc;`;
  modalTitle.textContent = letter.title;
  modalBar.style.background = `linear-gradient(90deg, ${accent}, transparent)`;
  modalBox.style.boxShadow   = `0 0 80px ${accent}18, 0 40px 80px rgba(0,0,0,0.65), inset 0 1px 0 rgba(255,255,255,0.06)`;
  modalBody.textContent  = letter.body;
  modalBox.classList.remove('closing');
  overlay.classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  modalBox.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('show');
    document.body.style.overflow = '';
  }, 290);
}
</script>
